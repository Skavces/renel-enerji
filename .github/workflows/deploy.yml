name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Lockfile'lar npm 11 ile üretiliyor (Dockerfile'lar da npm@11 kullanır);
      # Node 22'nin paketli npm 10'u bu lockfile'ları "out of sync" sayar
      - name: npm sürümünü sabitle
        run: npm install -g npm@11

      - name: Backend testleri
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Backend build
        working-directory: backend
        run: npm run build

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/renel-enerji
            git pull
            docker compose up -d --build
            docker image prune -f

            echo "Sağlık kontrolü yapılıyor..."
            for i in $(seq 1 10); do
              if curl -fs http://localhost:8080/api/health > /dev/null; then
                echo "Backend ayakta, deploy başarılı."
                exit 0
              fi
              echo "Henüz hazır değil, 5sn sonra tekrar denenecek... ($i/10)"
              sleep 5
            done
            echo "HATA: Backend health check'i geçmedi, container loglarına bakılıyor:"
            docker compose logs --tail=50 backend
            exit 1
