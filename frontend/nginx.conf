map $http_user_agent $is_bot {
    default                       0;
    "~*googlebot"                 1;
    "~*bingbot"                   1;
    "~*yandexbot"                 1;
    "~*duckduckbot"               1;
    "~*baiduspider"               1;
    "~*facebookexternalhit"       1;
    "~*twitterbot"                1;
    "~*linkedinbot"               1;
    "~*slackbot"                  1;
    "~*whatsapp"                  1;
    "~*Prerender"                 0;
}

# Rate-limit prerender rendering per client IP — bots get limited,
# normal visitors (empty key) are exempt. Prevents spoofed-UA clients
# from exhausting the prerender container's CPU/memory.
map $is_bot $prerender_limit_key {
    0 "";
    1 $binary_remote_addr;
}
limit_req_zone $prerender_limit_key zone=prerender:1m rate=1r/s;

# Restore real client IP from Cloudflare
geo $cloudflare {
    default 0;
    103.21.244.0/22 1; 103.22.200.0/22 1; 103.31.4.0/22 1;
    104.16.0.0/13 1;  104.24.0.0/14 1;
    108.162.192.0/18 1; 131.0.72.0/22 1; 141.101.64.0/18 1;
    162.158.0.0/15 1; 172.64.0.0/13 1;  173.245.48.0/20 1;
    188.114.96.0/20 1; 190.93.240.0/20 1; 197.234.240.0/22 1;
    198.41.128.0/17 1;
    2400:cb00::/32 1; 2606:4700::/32 1; 2803:f800::/32 1;
    2405:b500::/32 1; 2405:8100::/32 1; 2a06:98c0::/29 1;
    2c0f:f248::/32 1;
}

server {
    listen 8080;
    server_name _;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://*.sentry.io https://*.ingest.us.sentry.io https://*.ingest.de.sentry.io https://*.cloudflareinsights.com; frame-src https://maps.google.com https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location ^~ /umami/ {
        proxy_pass http://umami:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect / /umami/;

        # add_header in location blocks does NOT inherit from server block — repeat all headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # Relaxed CSP for Umami — Next.js requires unsafe-inline and unsafe-eval
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    # Umami Next.js static assets — requested at /_next/ without /umami/ prefix
    location ^~ /_next/ {
        proxy_pass http://umami:3000/_next/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Suppress favicon/manifest 404s that Umami's HTML triggers
    location = /favicon.ico { return 204; access_log off; }
    location = /favicon-32x32.png { return 204; access_log off; }
    location = /favicon-16x16.png { return 204; access_log off; }
    location = /site.webmanifest { return 204; access_log off; }

    location ^~ /sitemap.xml {
        proxy_pass http://backend:3001/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        client_max_body_size 100m;
    }

    location ^~ /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|woff2|woff|ttf|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        limit_req zone=prerender burst=20 nodelay;
        limit_req_status 429;
        if ($is_bot = 1) {
            proxy_pass http://prerender:3000/https://renelenerji.com$request_uri;
            break;
        }
        try_files $uri $uri/ /index.html;
    }
}
