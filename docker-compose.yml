services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: renel
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: renel_enerji
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renel -d renel_enerji"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      PORT: "3001"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: renel
      DB_PASS: ${DB_PASS}
      DB_NAME: renel_enerji
      JWT_SECRET: ${JWT_SECRET}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      JWT_EXPIRES_IN: 8h
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      FRONTEND_URL: ${FRONTEND_URL}
      UMAMI_URL: http://umami:3000
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID}
      UMAMI_USER: ${UMAMI_USER:-admin}
      UMAMI_PASS: ${UMAMI_PASS}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_API_KEY_2: ${GROQ_API_KEY_2}
      GROQ_API_KEY_3: ${GROQ_API_KEY_3}
      SENTRY_DSN: ${SENTRY_DSN}
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379
      DB_SYNC: ${DB_SYNC:-false}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN}
      INSTAGRAM_USER_ID: ${INSTAGRAM_USER_ID}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET}
      INSTAGRAM_WEBHOOK_VERIFY_TOKEN: ${INSTAGRAM_WEBHOOK_VERIFY_TOKEN}
      # Docker ağı içinden doğrudan ntfy container'ına gider — nginx/Cloudflare'e bağımlı değil
      NTFY_URL: http://ntfy:80
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASS}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prerender:
    image: tvanro/prerender-alpine:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      CACHE_MAXSIZE: "300"
      CACHE_TTL: "86400"
    mem_limit: 512m

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_UMAMI_URL: ${VITE_UMAMI_URL}
        VITE_UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - backend
      - prerender

  ntfy:
    image: binwiederhier/ntfy
    restart: unless-stopped
    command: serve
    expose:
      - "80"
    environment:
      NTFY_BASE_URL: https://renelenerji.com/ntfy
      NTFY_BEHIND_PROXY: "true"
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_ENABLE_SIGNUP: "false"
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
    volumes:
      - ntfy_auth:/var/lib/ntfy
      - ntfy_cache:/var/cache/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASS}
      POSTGRES_DB: umami
    volumes:
      - umami_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 10

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASS}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      BASE_PATH: /umami
    depends_on:
      umami-db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  umami_pgdata:
  redisdata:
  ntfy_auth:
  ntfy_cache:
