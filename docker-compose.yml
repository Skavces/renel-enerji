services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: renel
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: renel_enerji
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renel -d renel_enerji"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      PORT: "3001"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: renel
      DB_PASS: ${DB_PASS}
      DB_NAME: renel_enerji
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      FRONTEND_URL: ${FRONTEND_URL}
      UMAMI_URL: http://umami:3000
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID}
      UMAMI_USER: ${UMAMI_USER:-admin}
      UMAMI_PASS: ${UMAMI_PASS}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_UMAMI_URL: ${VITE_UMAMI_URL}
        VITE_UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASS}
      POSTGRES_DB: umami
    volumes:
      - umami_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 10

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASS}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  umami_pgdata:
