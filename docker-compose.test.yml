# Throwaway e2e test altyapısı — canlı compose'dan bağımsız portlarda çalışır,
# veriler tmpfs'te tutulur (container silinince kaybolur).
#
# Kullanım:
#   docker compose -f docker-compose.test.yml up -d
#   cd backend && npm run test:e2e
#   docker compose -f docker-compose.test.yml down
#
# Ayrı proje adı: canlı compose'un ağını/adlarını paylaşmasın
name: renel-enerji-test
services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: renel_enerji_test
    ports:
      - '127.0.0.1:5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:6380:6379'
